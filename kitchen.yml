---
driver:
  name: vagrant

provisioner:
  name: chef_zero
  deprecations_as_errors: true
  product_name: chef
  chef_license: accept-no-persist
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  enforce_idempotency: true
  multiple_converge: 2
  log_level: <%= ENV['CHEF_LOG_LEVEL'] || 'auto' %>

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-11
  - name: debian-12
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    run_list:
      - recipe[test::default]

  - name: ldap
    run_list:
      - recipe[test::ldap]

  - name: proxy
    run_list:
      - recipe[test::proxy]

  - name: plugins
    run_list:
      - recipe[test::plugins]

  - name: basic
    run_list:
      - recipe[test::basic]

  - name: configure
    run_list:
      - recipe[test::configure]

  - name: azuread
    run_list:
      - recipe[test::azuread]

  - name: config-plugins
    run_list:
      - recipe[test::config-plugins]
